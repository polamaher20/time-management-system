<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كاتدرائية العذراء وأبو سيفين والأنبا كاراس - نظام إدارة الألعاب</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #8B6A2A;
    --bronze: #8B5E3C;
    --bg: #F8F4EE;
    --surface: #FFFFFF;
    --surface2: #F0EBE3;
    --text: #1A1208;
    --text-muted: #6B5744;
    --border: #DDD0BC;
    --shadow: rgba(139,94,60,0.12);
    --ps-color: #003791;
    --ping-color: #E8380D;
    --billiard-color: #1A6B3C;
    --hockey-color: #1A4A8B;
    --danger: #DC2626;
    --warning: #D97706;
    --success: #059669;
  }
  .dark {
    --bg: #0F172A;
    --surface: #1E293B;
    --surface2: #162032;
    --text: #F1EDE6;
    --text-muted: #94A3B8;
    --border: #2D3A4E;
    --shadow: rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--gold);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px var(--shadow);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 0.85rem;
  }

  .logo-wrap {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--gold);
    flex-shrink: 0;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

  .brand-text h1 {
    font-family: 'Amiri', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.3;
  }
  .brand-text p {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .live-clock {
    font-family: 'Cairo', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    background: var(--surface2);
    padding: 0.35rem 0.85rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    letter-spacing: 1px;
  }

  .toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.2s;
    color: var(--text);
  }
  .toggle-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* MAIN */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  .section-title {
    font-family: 'Amiri', serif;
    font-size: 1.3rem;
    color: var(--gold);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* GAMES GRID */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
    margin-bottom: 2rem;
  }

  .game-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .game-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px var(--shadow);
  }

  .card-header {
    padding: 1rem 1.25rem 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .game-icon {
    font-size: 2rem;
  }

  .game-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
  }

  .game-status {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
  }
  .status-free { background: #D1FAE5; color: #065F46; }
  .status-busy { background: #FEE2E2; color: #991B1B; }
  .dark .status-free { background: #064E3B; color: #6EE7B7; }
  .dark .status-busy { background: #7F1D1D; color: #FCA5A5; }

  .card-body { padding: 1rem 1.25rem; }

  /* TIMER RING */
  .timer-section {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .ring-wrap {
    position: relative;
    width: 72px;
    height: 72px;
    flex-shrink: 0;
  }

  .ring-wrap svg {
    transform: rotate(-90deg);
    width: 72px; height: 72px;
  }

  .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 5;
  }

  .ring-progress {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 188.5;
    stroke-dashoffset: 188.5;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .ring-label .time-display {
    font-size: 0.9rem;
    font-weight: 800;
    color: var(--gold);
  }

  .timer-info { flex: 1; }
  .timer-info .booked-for {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 0.2rem;
  }
  .timer-info .customer-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .timer-info .end-time {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
  }

  /* BOOKING FORM */
  .booking-form {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .form-row {
    display: flex;
    gap: 0.5rem;
  }

  .input-field {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }
  .input-field:focus { border-color: var(--gold); }
  .input-field::placeholder { color: var(--text-muted); }

  .select-field {
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    direction: rtl;
  }
  .select-field:focus { border-color: var(--gold); }

  .btn-book {
    padding: 0.55rem 1rem;
    border-radius: 8px;
    border: none;
    background: var(--gold);
    color: #1A1208;
    font-family: 'Cairo', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .btn-book:hover { background: var(--gold-light); transform: scale(1.01); }

  .btn-stop {
    padding: 0.45rem 0.85rem;
    border-radius: 8px;
    border: 1.5px solid var(--danger);
    background: transparent;
    color: var(--danger);
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-top: 0.25rem;
  }
  .btn-stop:hover { background: var(--danger); color: white; }

  /* COLOR ACCENTS PER GAME */
  .ps-card .ring-progress { stroke: var(--ps-color); }
  .ps-card .btn-book { background: var(--ps-color); color: white; }
  .ps-card .btn-book:hover { background: #0046BA; }
  .ps-card .card-header { border-top: 3px solid var(--ps-color); }

  .ping-card .ring-progress { stroke: var(--ping-color); }
  .ping-card .btn-book { background: var(--ping-color); color: white; }
  .ping-card .btn-book:hover { background: #FF5733; }
  .ping-card .card-header { border-top: 3px solid var(--ping-color); }

  .billiard-card .ring-progress { stroke: var(--billiard-color); }
  .billiard-card .btn-book { background: var(--billiard-color); color: white; }
  .billiard-card .btn-book:hover { background: #218838; }
  .billiard-card .card-header { border-top: 3px solid var(--billiard-color); }

  .hockey-card .ring-progress { stroke: var(--hockey-color); }
  .hockey-card .btn-book { background: var(--hockey-color); color: white; }
  .hockey-card .btn-book:hover { background: #1E5799; }
  .hockey-card .card-header { border-top: 3px solid var(--hockey-color); }

  .ring-progress.warning { stroke: var(--warning) !important; }
  .ring-progress.danger { stroke: var(--danger) !important; animation: pulse-ring 1s infinite; }

  @keyframes pulse-ring {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* MODE & DUR TABS */
  .mode-btn {
    flex: 1;
    padding: 0.45rem 0.5rem;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }
  .mode-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #1A1208;
  }
  .mode-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

  .dur-tabs {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
  }
  .dur-tab {
    flex: 1;
    min-width: 50px;
    padding: 0.4rem 0.3rem;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .dur-tab.active {
    background: var(--surface);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold);
  }
  .dur-tab:hover:not(.active) { border-color: var(--gold); }
  .price-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.2rem 0.5rem;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .price-badge strong { color: var(--gold); }

  /* TOAST NOTIFICATIONS */
  .toast-container {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    pointer-events: none;
  }

  .toast {
    background: var(--surface);
    border: 1.5px solid var(--gold);
    border-radius: 12px;
    padding: 0.85rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    min-width: 280px;
    max-width: 380px;
    pointer-events: auto;
    animation: slideDown 0.4s ease;
    direction: rtl;
  }

  .toast.expired { border-color: var(--danger); }
  .toast.warning { border-color: var(--warning); }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .toast-icon { font-size: 1.5rem; flex-shrink: 0; }
  .toast-content { flex: 1; }
  .toast-title { font-size: 0.88rem; font-weight: 700; color: var(--text); }
  .toast-msg { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }
  .toast-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0;
    flex-shrink: 0;
  }

  /* HISTORY TABLE */
  .history-section {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .history-section table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .history-section th {
    background: var(--surface2);
    padding: 0.65rem 1rem;
    text-align: right;
    color: var(--text-muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .history-section td {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .history-section tr:last-child td { border-bottom: none; }
  .history-section tr:hover td { background: var(--surface2); }

  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 600;
  }
  .badge-completed { background: #D1FAE5; color: #065F46; }
  .badge-active { background: #DBEAFE; color: #1E40AF; }
  .dark .badge-completed { background: #064E3B; color: #6EE7B7; }
  .dark .badge-active { background: #1E3A5F; color: #93C5FD; }

  /* EMPTY STATE */
  .empty-history {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .brand-text h1 { font-size: 0.8rem; }
    .games-grid { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; }
    .live-clock { font-size: 0.9rem; padding: 0.3rem 0.6rem; }
    .header-brand { gap: 0.5rem; }
    .logo-wrap { width: 44px; height: 44px; }
    .toast { min-width: 250px; }
  }
  @media (max-width: 400px) {
    header { padding: 0.5rem 0.75rem; }
    main { padding: 1rem 0.75rem; }
  }
</style>
</head>

<script>
const GAMES = [
  { id: 'ps', label: 'بلايستيشن', icon: '🎮', class: 'ps-card', prices: { 30: 15, 60: 25, 120: 45 } },
  { id: 'ping', label: 'بينج بونج', icon: '🏓', class: 'ping-card', prices: { 30: 10, 60: 18, 120: 30 } },
  { id: 'billiard', label: 'بلياردو', icon: '🎱', class: 'billiard-card', prices: { 30: 12, 60: 20, 120: 35 } },
  { id: 'hockey', label: 'هوكي هواء', icon: '🏒', class: 'hockey-card', prices: { 30: 10, 60: 18, 120: 30 } },
];

let bookings = {}; // id -> { name, duration, startTime, endTime, intervalId }
let history = [];
let isDark = false;
let warned = {}; // id -> bool

// Clock - 12h format
function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const ampm = h >= 12 ? 'م' : 'ص';
  const h12 = h % 12 || 12;
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('liveClock').textContent = `${pad(h12)}:${pad(m)}:${pad(s)} ${ampm}`;
}
setInterval(updateClock, 1000);
updateClock();

// Theme
document.getElementById('themeToggle').addEventListener('click', () => {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
});

let gameState = {}; // id -> { dur, mode, custom }

function getPrice(game, dur, mode) {
  const base = game.prices[dur] || Math.round((dur / 30) * game.prices[30]);
  return mode === 'double' ? Math.round(base * 1.8) : base;
}

function updatePriceBadge(id) {
  const game = GAMES.find(g => g.id === id);
  const st = gameState[id] || { dur: 30, mode: 'single' };
  const priceEl = document.getElementById(`price-${id}`);
  const modeLabel = document.getElementById(`mode-label-${id}`);
  if (priceEl) priceEl.textContent = getPrice(game, st.dur, st.mode) + ' جنيه';
  if (modeLabel) modeLabel.textContent = st.mode === 'double' ? '· زوجي (×1.8)' : '· فردي';
}

function setMode(id, mode) {
  gameState[id] = gameState[id] || { dur: 30, mode: 'single' };
  gameState[id].mode = mode;
  document.getElementById(`mode-single-${id}`)?.classList.toggle('active', mode === 'single');
  document.getElementById(`mode-double-${id}`)?.classList.toggle('active', mode === 'double');
  updatePriceBadge(id);
}

function selectDur(id, dur) {
  gameState[id] = gameState[id] || { dur: 30, mode: 'single' };
  gameState[id].dur = dur;
  gameState[id].custom = false;
  // Update tab active state
  const tabs = document.querySelectorAll(`#dur-tabs-${id} .dur-tab`);
  tabs.forEach(t => t.classList.remove('active'));
  // Find the right tab
  const durMap = { 30: 0, 60: 1, 120: 2 };
  if (durMap[dur] !== undefined && tabs[durMap[dur]]) tabs[durMap[dur]].classList.add('active');
  // Hide custom input
  const ci = document.getElementById(`custom-input-${id}`);
  if (ci) ci.style.display = 'none';
  updatePriceBadge(id);
}

function toggleCustom(id) {
  gameState[id] = gameState[id] || { dur: 30, mode: 'single' };
  const ci = document.getElementById(`custom-input-${id}`);
  const visible = ci?.style.display !== 'none';
  if (ci) ci.style.display = visible ? 'none' : 'block';
  if (!visible) {
    // Deactivate preset tabs
    const tabs = document.querySelectorAll(`#dur-tabs-${id} .dur-tab`);
    tabs.forEach(t => t.classList.remove('active'));
    document.getElementById(`custom-tab-${id}`)?.classList.add('active');
  }
}

function updateCustomDur(id) {
  const input = document.getElementById(`custom-min-${id}`);
  const val = parseInt(input?.value);
  if (val && val > 0) {
    gameState[id] = gameState[id] || { dur: 30, mode: 'single' };
    gameState[id].dur = val;
    gameState[id].custom = true;
    updatePriceBadge(id);
  }
}

// Render games
function renderGames() {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = GAMES.map(g => {
    const booking = bookings[g.id];
    const isBusy = !!booking;
    return `
    <div class="game-card ${g.class}" id="card-${g.id}">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="game-icon">${g.icon}</span>
          <span class="game-title">${g.label}</span>
        </div>
        <span class="game-status ${isBusy ? 'status-busy' : 'status-free'}">
          ${isBusy ? '● مشغول' : '● متاح'}
        </span>
      </div>
      <div class="card-body">
        <div class="timer-section">
          <div class="ring-wrap">
            <svg viewBox="0 0 72 72">
              <circle class="ring-bg" cx="36" cy="36" r="30"/>
              <circle class="ring-progress ${isBusy ? getRingClass(g.id) : ''}" id="ring-${g.id}" cx="36" cy="36" r="30"
                style="stroke-dashoffset:${isBusy ? getRingOffset(g.id) : '188.5'}"/>
            </svg>
            <div class="ring-label">
              <span class="time-display" id="time-${g.id}">${isBusy ? formatRemaining(g.id) : '--:--'}</span>
              <span style="font-size:0.58rem;color:var(--text-muted)">${isBusy ? 'متبقي' : 'حر'}</span>
            </div>
          </div>
          <div class="timer-info">
            ${isBusy ? `
              <div class="booked-for">حجز لـ ${booking.duration} دقيقة</div>
              <div class="customer-name">${booking.name}</div>
              <div class="end-time">ينتهي: ${formatTime(booking.endTime)}</div>
            ` : `<div class="booked-for" style="color:var(--text-muted)">لا يوجد حجز حالي</div>`}
          </div>
        </div>

        ${!isBusy ? `
        <div class="booking-form" id="form-${g.id}">
          <input class="input-field" id="name-${g.id}" placeholder="اسم الشخص / المجموعة" type="text">

          <div class="form-row" style="gap:0.5rem">
            <button type="button" class="mode-btn active" id="mode-single-${g.id}" onclick="setMode('${g.id}','single')">👤 فردي</button>
            <button type="button" class="mode-btn" id="mode-double-${g.id}" onclick="setMode('${g.id}','double')">👥 زوجي</button>
          </div>

          <div class="dur-tabs" id="dur-tabs-${g.id}">
            <button type="button" class="dur-tab active" onclick="selectDur('${g.id}',30)">30 د</button>
            <button type="button" class="dur-tab" onclick="selectDur('${g.id}',60)">ساعة</button>
            <button type="button" class="dur-tab" onclick="selectDur('${g.id}',120)">ساعتين</button>
            <button type="button" class="dur-tab" id="custom-tab-${g.id}" onclick="toggleCustom('${g.id}')">✏️ تخصيص</button>
          </div>
          <div id="custom-input-${g.id}" style="display:none;margin-top:0.25rem">
            <input class="input-field" type="number" min="1" max="480" placeholder="أدخل الدقائق (مثال: 45)" id="custom-min-${g.id}" oninput="updateCustomDur('${g.id}')">
          </div>

          <div class="price-badge">السعر: <strong id="price-${g.id}">${g.prices[30]} جنيه</strong> <span id="mode-label-${g.id}" style="color:var(--text-muted);font-size:0.68rem">· فردي</span></div>
          <button class="btn-book" onclick="book('${g.id}')">✅ احجز الآن</button>
        </div>
        ` : `
        <button class="btn-stop" onclick="endBooking('${g.id}')">⏹ إنهاء الحجز</button>
        `}
      </div>
    </div>`;
  }).join('');

  // Init state for each free game
  GAMES.forEach(g => {
    if (!bookings[g.id]) {
      gameState[g.id] = gameState[g.id] || { dur: 30, mode: 'single', custom: false };
      updatePriceBadge(g.id);
    }
  });
}

function getRingOffset(id) {
  const b = bookings[id];
  if (!b) return 188.5;
  const total = b.duration * 60 * 1000;
  const elapsed = Date.now() - b.startTime;
  const progress = Math.min(elapsed / total, 1);
  return 188.5 * (1 - (1 - progress)); // offset = 188.5 * progress
}

function getRingClass(id) {
  const b = bookings[id];
  if (!b) return '';
  const total = b.duration * 60 * 1000;
  const remaining = b.endTime - Date.now();
  const pct = remaining / total;
  if (pct <= 0.1) return 'danger';
  if (pct <= 0.25) return 'warning';
  return '';
}

function formatRemaining(id) {
  const b = bookings[id];
  if (!b) return '--:--';
  const rem = Math.max(0, b.endTime - Date.now());
  const m = Math.floor(rem / 60000);
  const s = Math.floor((rem % 60000) / 1000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function book(id) {
  const nameEl = document.getElementById(`name-${id}`);
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { showToast('⚠️', 'تنبيه', 'من فضلك أدخل اسم الشخص', 'warning'); return; }

  const st = gameState[id] || { dur: 30, mode: 'single' };
  const duration = st.dur;
  if (!duration || duration < 1) { showToast('⚠️', 'تنبيه', 'من فضلك اختر أو أدخل المدة', 'warning'); return; }

  const game = GAMES.find(g => g.id === id);
  const price = getPrice(game, duration, st.mode);
  const startTime = Date.now();
  const endTime = startTime + duration * 60000;

  const intervalId = setInterval(() => tickBooking(id), 1000);
  warned[id] = false;

  bookings[id] = { name, duration, startTime, endTime, intervalId, price, mode: st.mode };
  saveBookings();

  const modeLabel = st.mode === 'double' ? 'زوجي' : 'فردي';
  history.unshift({ game: game.label, name, duration, price, startTime, endTime, status: 'active', mode: modeLabel, id: Date.now() });
  updateHistory();

  showToast('🎮', `تم الحجز - ${game.label}`, `${name} | ${duration} دقيقة | ${modeLabel} | ${price} ج`, 'success', null);
  renderGames();
}

function tickBooking(id) {
  const b = bookings[id];
  if (!b) return;

  const remaining = b.endTime - Date.now();

  // Update ring
  const ring = document.getElementById(`ring-${id}`);
  const timeEl = document.getElementById(`time-${id}`);
  if (timeEl) timeEl.textContent = formatRemaining(id);

  if (ring) {
    const total = b.duration * 60000;
    const progress = Math.min(1 - remaining / total, 1);
    ring.style.strokeDashoffset = 188.5 * progress;
    ring.className = 'ring-progress ' + getRingClass(id);
  }

  // Warning at 5 min
  if (!warned[id] && remaining > 0 && remaining <= 5 * 60000) {
    warned[id] = true;
    const game = GAMES.find(g => g.id === id);
    showToast('⏰', `تحذير - ${game.label}`, `باقي 5 دقائق لـ ${b.name}`, 'warning', null);
  }

  // Expired
  if (remaining <= 0) {
    const game = GAMES.find(g => g.id === id);
    showToast('🔔', `انتهى الحجز - ${game.label}`, `انتهى وقت ${b.name} — اضغط إيقاف لإسكات التنبيه`, 'expired', id);
    const entry = history.find(h => h.name === b.name && h.status === 'active');
    if (entry) entry.status = 'completed';
    updateHistory();
    clearInterval(b.intervalId);
    delete bookings[id];
    delete warned[id];
    saveBookings();
    renderGames();
  }
}

function endBooking(id) {
  const b = bookings[id];
  if (!b) return;
  clearInterval(b.intervalId);
  const game = GAMES.find(g => g.id === id);
  const entry = history.find(h => h.name === b.name && h.status === 'active');
  if (entry) entry.status = 'completed';
  updateHistory();
  showToast('✅', `تم الإنهاء - ${game.label}`, `تم إنهاء حجز ${b.name}`, 'success', null);
  stopAlarm(id);
  delete bookings[id];
  delete warned[id];
  saveBookings();
  renderGames();
}

function updateHistory() {
  const tbody = document.getElementById('historyBody');
  if (history.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-history">لا توجد حجوزات بعد</td></tr>';
    return;
  }
  tbody.innerHTML = history.slice(0, 20).map(h => `
    <tr>
      <td>${h.game}</td>
      <td>${h.name}</td>
      <td>${h.mode || 'فردي'}</td>
      <td>${h.duration} د</td>
      <td>${h.price} ج</td>
      <td>${formatTime(h.startTime)}</td>
      <td><span class="badge ${h.status === 'active' ? 'badge-active' : 'badge-completed'}">${h.status === 'active' ? 'نشط' : 'منتهي'}</span></td>
    </tr>
  `).join('');
}

// ─── ALARM ────────────────────────────────────────────────────────────────────
let alarmCtx = null;
let alarmNodes = []; // { osc, gain }
let activeAlarms = {}; // gameId -> true

function startAlarm(gameId) {
  if (activeAlarms[gameId]) return;
  activeAlarms[gameId] = true;
  try {
    if (!alarmCtx) alarmCtx = new (window.AudioContext || window.webkitAudioContext)();
    const playBeep = () => {
      if (!activeAlarms[gameId]) return;
      const osc = alarmCtx.createOscillator();
      const gain = alarmCtx.createGain();
      osc.connect(gain); gain.connect(alarmCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.35, alarmCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, alarmCtx.currentTime + 0.5);
      osc.start(alarmCtx.currentTime);
      osc.stop(alarmCtx.currentTime + 0.5);
      alarmNodes.push({ osc, gain });
      // Repeat every 1.2s while alarm active
      setTimeout(() => { if (activeAlarms[gameId]) playBeep(); }, 1200);
    };
    playBeep();
  } catch(e) {}
}

function stopAlarm(gameId) {
  delete activeAlarms[gameId];
}

function stopAllAlarms() {
  Object.keys(activeAlarms).forEach(k => delete activeAlarms[k]);
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(icon, title, msg, type = 'info', gameId = null) {
  const container = document.getElementById('toastContainer');
  const toastId = 'toast-' + Date.now();
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.id = toastId;
  toast.innerHTML = `
    <span class="toast-icon">${icon}</span>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-msg">${msg}</div>
    </div>
    ${gameId ? `<button class="toast-close" onclick="stopAlarm('${gameId}');this.closest('.toast').remove()">🔇 إيقاف</button>` : `<button class="toast-close" onclick="this.parentElement.remove()">✕</button>`}
  `;
  container.appendChild(toast);

  if (type === 'expired' && gameId) {
    startAlarm(gameId);
    // No auto-dismiss for expired — user must close manually
  } else {
    setTimeout(() => toast.remove(), 4000);
  }
}

// ─── LOCALSTORAGE ─────────────────────────────────────────────────────────────
const LS_HISTORY = 'church_game_history';
const LS_BOOKINGS = 'church_game_bookings';

function saveHistory() {
  try { localStorage.setItem(LS_HISTORY, JSON.stringify(history)); } catch(e) {}
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(LS_HISTORY);
    if (raw) {
      history = JSON.parse(raw);
      // Mark any "active" entries as completed (they were active before refresh)
      history.forEach(h => { if (h.status === 'active') h.status = 'completed'; });
      saveHistory();
    }
  } catch(e) {}
}

function saveBookings() {
  // Save serializable bookings (no intervalId)
  try {
    const toSave = {};
    Object.entries(bookings).forEach(([id, b]) => {
      toSave[id] = { name: b.name, duration: b.duration, startTime: b.startTime, endTime: b.endTime, price: b.price, mode: b.mode };
    });
    localStorage.setItem(LS_BOOKINGS, JSON.stringify(toSave));
  } catch(e) {}
}

function loadBookings() {
  try {
    const raw = localStorage.getItem(LS_BOOKINGS);
    if (!raw) return;
    const saved = JSON.parse(raw);
    Object.entries(saved).forEach(([id, b]) => {
      if (b.endTime > Date.now()) {
        // Still valid — restore
        warned[id] = false;
        bookings[id] = { ...b, intervalId: setInterval(() => tickBooking(id), 1000) };
      }
    });
  } catch(e) {}
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function updateHistory() {
  const tbody = document.getElementById('historyBody');
  if (history.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-history">لا توجد حجوزات بعد</td></tr>';
  } else {
    tbody.innerHTML = history.slice(0, 50).map(h => `
      <tr>
        <td>${h.game}</td>
        <td>${h.name}</td>
        <td>${h.mode || 'فردي'}</td>
        <td>${h.duration} د</td>
        <td>${h.price} ج</td>
        <td>${formatTime(h.startTime)}</td>
        <td>${h.endTime ? formatTime(h.endTime) : '—'}</td>
        <td><span class="badge ${h.status === 'active' ? 'badge-active' : 'badge-completed'}">${h.status === 'active' ? 'نشط' : 'منتهي'}</span></td>
      </tr>
    `).join('');
  }
  saveHistory();
  updateDailySummary();
}

function clearHistory() {
  showConfirm('هل أنت متأكد من مسح جميع سجلات الحجوزات؟', () => {
    history = [];
    saveHistory();
    updateHistory();
    showToast('🗑️', 'تم المسح', 'تم مسح جميع الحجوزات', 'info', null);
  });
}

function showConfirm(msg, onYes) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:var(--surface);border-radius:16px;padding:1.5rem;max-width:320px;width:90%;text-align:center;border:2px solid var(--danger);font-family:Cairo,sans-serif;direction:rtl">
      <div style="font-size:2rem;margin-bottom:0.5rem">&#128465;</div>
      <div style="font-weight:700;color:var(--text);margin-bottom:0.5rem;font-size:0.95rem">${msg}</div>
      <div style="display:flex;gap:0.75rem;justify-content:center;margin-top:1rem">
        <button onclick="this.closest('div[style]').parentElement.remove()" style="flex:1;padding:0.55rem;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:Cairo,sans-serif;font-weight:600;cursor:pointer;font-size:0.85rem">&#1573;&#1604;&#1594;&#1575;&#1569;</button>
        <button id="confirmYes" style="flex:1;padding:0.55rem;border-radius:8px;border:none;background:var(--danger);color:white;font-family:Cairo,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem">&#1605;&#1587;&#1581;</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirmYes').onclick = () => { overlay.remove(); onYes(); };
  overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
}

// ─── DAILY SUMMARY ────────────────────────────────────────────────────────────
function updateDailySummary() {
  const todayStr = new Date().toDateString();
  const summary = {};
  GAMES.forEach(g => { summary[g.id] = { label: g.label, icon: g.icon, minutes: 0, revenue: 0, sessions: 0 }; });

  history.forEach(h => {
    if (new Date(h.startTime).toDateString() !== todayStr) return;
    const game = GAMES.find(g => g.label === h.game);
    if (!game) return;
    summary[game.id].minutes += h.duration || 0;
    summary[game.id].revenue += h.price || 0;
    summary[game.id].sessions += 1;
  });

  const totalRevenue = Object.values(summary).reduce((a, s) => a + s.revenue, 0);
  const totalMinutes = Object.values(summary).reduce((a, s) => a + s.minutes, 0);

  const tbody = document.getElementById('summaryBody');
  tbody.innerHTML = GAMES.map(g => {
    const s = summary[g.id];
    const hrs = Math.floor(s.minutes / 60);
    const mins = s.minutes % 60;
    const timeStr = hrs > 0 ? `${hrs}س ${mins}د` : `${mins}د`;
    return `
      <tr>
        <td>${s.icon} ${s.label}</td>
        <td>${s.sessions}</td>
        <td>${timeStr || '—'}</td>
        <td style="color:var(--gold);font-weight:700">${s.revenue} ج</td>
      </tr>
    `;
  }).join('');

  document.getElementById('summaryTotal').textContent =
    `إجمالي اليوم: ${totalRevenue} جنيه  |  إجمالي الوقت: ${totalMinutes} د`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadHistory();
loadBookings();
renderGames();
updateHistory();
</script>
